<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes projets GitHub</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .repo {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            transition: 0.3s;
        }

        .repo:hover {
            transform: scale(1.02);
            background: #334155;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Mes projets GitHub</h1>
    <div id="repos"></div>

    <script>
        const username = "Led-oa"; // ← remplace par ton username GitHub

        fetch(`https://api.github.com/users/${username}/repos`)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById("repos");

                data.forEach(repo => {
                    const div = document.createElement("div");
                    div.classList.add("repo");

                    div.innerHTML = `
                    <h2>${repo.name}</h2>
                    <p>${repo.description || "Pas de description"}</p>
                    <a href="${repo.html_url}" target="_blank">Voir le projet</a>
                `;

                    container.appendChild(div);
                });
            })
            .catch(error => console.error(error));
    </script>

</body>

</html>
